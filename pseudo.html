<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo Classes & Elements</title>

    <link rel="stylesheet" href="pseudo.css">
</head>
<body>
    <header>
        <h1>Codyan.</h1>

        <nav class="navbar">
            <a href="#">Explore Courses</a>
            <a href="#">Learning Paths</a>
            <a href="#">Mentors</a>
            <a href="#">Success Stories</a>
        </nav>
    </header>

    <section>
        <h2>Custom Checkbox</h2>

        <input type="checkbox" id="agree">

        <label for="agree" class="checkbox-label">
            Enroll me in the Codyan learning journey
        </label>
    </section>

    <section>
        <h2>Popular Learning Tracks</h2>

        <ol class="custom-list">
            <li>Frontend Development</li>
            <li>UI / UX Design</li>
            <li>Flutter Development</li>
            <li>Full Stack Engineering</li>
        </ol>
    </section>

    <section>
        <h2>Tooltip Example</h2>

        <button
            class="tooltip-btn"
            data-tooltip="Explore over 100 professional courses">
            Browse Courses
        </button>
    </section>

</body>
</html>
