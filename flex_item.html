<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flex item</title>
    <link rel="stylesheet" href="flex_item.css" />
  </head>
  <body>
    <main>
      <h1>Flex Item Property</h1>
      <h2>flex-grow</h2>
      <div class="grow-container">
        <div class="grow-box grow1">A</div>
        <div class="grow-box grow2">B</div>
        <div class="grow-box grow3">C</div>
        <div class="grow-box grow4">D</div>
        <div class="grow-box grow5">E</div>
        <div class="grow-box grow6">F</div>
      </div>

      <h2>flex-shrink</h2>
      <div class="shrink-container">
        <div class="shrink-box shrink1">A</div>
        <div class="shrink-box shrink2">B</div>
        <div class="shrink-box shrink3">C</div>
        <div class="shrink-box shrink4">D</div>
      </div>

      <h2>flex-basis</h2>
      <div class="basis-container">
        <div class="basis-box basis0">A</div>
        <div class="basis-box basis-auto">B</div>
        <div class="basis-box basis-200">C</div>
        <div class="basis-box basis-percent">D</div>
      </div>

      <h2>order</h2>
      <div class="order-container">
        <div class="box item1">1</div>
        <div class="box item2">2</div>
        <div class="box item3">3</div>
        <div class="box item4">4</div>
        <div class="box item5">5</div>
      </div>

      <h2>Align self</h2>
      <div class="align-self-container">
        <div class="box1">1</div>
        <div class="box2">2</div>
        <div class="box3">3</div>
      </div>
    </main>
  </body>
</html>
