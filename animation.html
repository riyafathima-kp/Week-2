<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS Keyframe Animations</title>

    <link rel="stylesheet" href="animation.css" />
    <script
      src="https://kit.fontawesome.com/e8f2f0e6fc.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <h1>CSS Keyframe Animations</h1>
    <section>
      <h2>Loading Spinner</h2>
      <div class="spinner"></div>
    </section>
    <section>
      <h2>Skeleton Loading</h2>

      <div class="skeleton-card">
        <div class="skeleton image"></div>

        <div class="skeleton title"></div>

        <div class="skeleton text"></div>
      </div>
    </section>
    <section>
      <h2>Card Entry Animation</h2>
      <div class="card visible">
        <img
          src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=600"
          alt="Ice Cream"
        />
        <h3>Chocolate Ice Cream</h3>
        <p>
          Fresh handcrafted premium ice cream made with natural ingredients.
        </p>
      </div>
    </section>
    <section>
      <h2>Notification Bell</h2>

      <i class="fa-solid fa-bell bell"></i>
    </section>
  </body>
</html>
